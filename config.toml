[api]
model = "deepseek-chat"
base_url = "https://api.deepseek.com/v1"
max_tokens = 4096
temperature = 0.7
# 复杂任务（出题/批改）使用的推理模型
reasoning_model = "deepseek-v4-pro"

[paths]
workspace = "workspace"
sessions = "data/sessions"
notes = "data/notes"
methods = "methods"
data = "data"
tools = "tools"

[runtime]
max_iterations = 30
max_tool_output = 8000
server_port = 8192

[education]
# 每日学习配置
math_daily_count = 4
english_daily_count = 4
exam_questions_count = 25      # 模考题数

# 出题时间
push_time = "09:00"

# 难度偏差: easy / normal / hard
difficulty_bias = "hard"

# 艾宾浩斯复习间隔（天）
ebbinghaus_intervals = [1, 2, 4, 7, 15]

# 掌握度阈值
[education.mastery]
mastered = 95         # >= 95 已掌握，降低出题频率
learning = 70         # 70-94 学习中
weak = 50             # 50-69 薄弱
critical = 0          # < 50 严重不足

# 掌握度分变动
[education.mastery_score]
perfect = 5           # 全对 +5
partial = 1           # 部分对 +1
wrong = -10           # 全错 -10

# ── 学期时间表（自动切换模式）──
[[education.semesters]]
name = "三下"
start_date = "2026-05-14"
end_date = "2026-06-30"
mode = "normal"
grade = "三年级下册"
knowledge_map = "data/knowledge_map.json"

[[education.semesters]]
name = "暑假"
start_date = "2026-07-01"
end_date = "2026-08-31"
mode = "summer"
grade = "三下→四上（衔接+KET备考）"
knowledge_map = "data/knowledge_map_4th.json"

[[education.semesters]]
name = "四上"
start_date = "2026-09-01"
end_date = "2027-01-15"
mode = "normal"
grade = "四年级上册"
knowledge_map = "data/knowledge_map_4th.json"

[[education.semesters]]
name = "寒假"
start_date = "2027-01-16"
end_date = "2027-02-28"
mode = "summer"
grade = "四上→四下（衔接）"
knowledge_map = "data/knowledge_map_4th.json"

[[education.semesters]]
name = "四下"
start_date = "2027-03-01"
end_date = "2027-06-30"
mode = "normal"
grade = "四年级下册"
knowledge_map = "data/knowledge_map_4th.json"

[feishu]
# 飞书API基础URL
base_url = "https://open.feishu.cn/open-apis"
# 消息卡片颜色
card_color = "orange"

# 消息轮询（内网无公网IP时使用，替代事件回调）
[feishu.poll]
enabled = true
# 要轮询的聊天ID列表（去飞书给机器人发消息后按下面方法获取）
chat_ids = ["oc_a232ed8b096918c5ff89fa9149e321fa"]
# 轮询间隔（秒）
interval_seconds = 10

[ocr]
# OCR引擎（纯云端，代码自动选择：飞书OCR → ocr.space 降级）
# 飞书OCR为主力引擎，需在飞书开放平台开通 optical_char_recognition 权限
# ocr.space 为备用（免费25000次/月），需在 https://ocr.space/ocrapi 注册获取API Key
# API Key 配置在 .env 文件的 OCR_SPACE_API_KEY 字段

# ═══════════════════════════════════════
# 正常模式（三下/四上/四下）
# ═══════════════════════════════════════
[[tasks.normal]]
type = "calc"
priority = 1
title = "🔢 计算热身"
question_count = 10
prompt_file = "prompts/calc.md"
prefix = "C"
difficulty = "normal"
output_file = "data/questions/questions_{today_str}_calc.json"

