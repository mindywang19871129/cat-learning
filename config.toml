[api]
model = "deepseek-chat"
base_url = "https://api.deepseek.com/v1"
max_tokens = 4096
temperature = 0.7
# 复杂任务（出题/批改）使用的推理模型
reasoning_model = "deepseek-v4-pro"

[paths]
workspace = "workspace"
sessions = "data/sessions"
notes = "data/notes"
methods = "methods"
data = "data"
tools = "tools"

[runtime]
max_iterations = 30
max_tool_output = 8000
server_port = 8192

[education]
# 每日学习配置
math_daily_count = 4
english_daily_count = 4
exam_questions_count = 25      # 模考题数

# 出题时间
push_time = "09:00"
friday_3days = false           # 已停用：每天正常出题，前一天未批改则跳过

# 课程起始日
course_start_date = "2026-05-14"

# 难度偏差: easy / normal / hard
difficulty_bias = "hard"

# 艾宾浩斯复习间隔（天）
ebbinghaus_intervals = [1, 2, 4, 7, 15]

# 掌握度阈值
[education.mastery]
mastered = 95         # >= 95 已掌握，降低出题频率
learning = 70         # 70-94 学习中
weak = 50             # 50-69 薄弱
critical = 0          # < 50 严重不足

# 掌握度分变动
[education.mastery_score]
perfect = 5           # 全对 +5
partial = 1           # 部分对 +1
wrong = -10           # 全错 -10

[feishu]
# 飞书API基础URL
base_url = "https://open.feishu.cn/open-apis"
# 消息卡片颜色
card_color = "orange"

# 消息轮询（内网无公网IP时使用，替代事件回调）
[feishu.poll]
enabled = true
# 要轮询的聊天ID列表（去飞书给机器人发消息后按下面方法获取）
chat_ids = ["oc_a232ed8b096918c5ff89fa9149e321fa"]
# 轮询间隔（秒）
interval_seconds = 10

[ocr]
# OCR引擎（纯云端，代码自动选择：飞书OCR → ocr.space 降级）
# 飞书OCR为主力引擎，需在飞书开放平台开通 optical_char_recognition 权限
# ocr.space 为备用（免费25000次/月），需在 https://ocr.space/ocrapi 注册获取API Key
# API Key 配置在 .env 文件的 OCR_SPACE_API_KEY 字段

# ── 每日学习任务配置 ──
# 按 priority 从小到大依次推送，孩子完成一个才能做下一个
# type: 任务类型标识
# priority: 推送优先级（数字越小越先推送）
# title: 飞书推送时显示的任务标题
# question_count: 题目数量
# prompt_file: LLM 出题提示词文件（相对于项目根目录）
# prefix: 试卷编号前缀（C=计算, V=词汇, G=语法, P=作文, T=数学, E=几何）
# difficulty: 默认难度（basic/normal/hard）
# output_file: 题目存储文件名模板（{today_str} 会被替换为当天日期）

[[tasks]]
type = "calc"
priority = 1
title = "🔢 计算热身"
question_count = 10
prompt_file = "prompts/calc.md"
prefix = "C"
difficulty = "normal"
output_file = "data/questions/questions_{today_str}_calc.json"

[[tasks]]
type = "vocab"
priority = 2
title = "📚 KET词汇"
question_count = 10
prompt_file = "prompts/vocab.md"
prefix = "V"
difficulty = "normal"
output_file = "data/questions/questions_{today_str}_vocab.json"

[[tasks]]
type = "grammar"
priority = 3
title = "📖 英语语法"
question_count = 4
prompt_file = "prompts/grammar.md"
prefix = "G"
difficulty = "normal"
output_file = "data/questions/questions_{today_str}_grammar.json"

[[tasks]]
type = "writing"
priority = 4
title = "✏️ 英语作文"
question_count = 1
prompt_file = "prompts/writing.md"
prefix = "P"
difficulty = "normal"
output_file = "data/questions/questions_{today_str}_writing.json"

[[tasks]]
type = "math"
priority = 5
title = "📐 数学综合"
question_count = 4
prompt_file = "prompts/math.md"
prefix = "T"
difficulty = "hard"
output_file = "data/questions/questions_{today_str}.json"

[[tasks]]
type = "geometry"
priority = 6
title = "📏 几何强化"
question_count = 3
prompt_file = "prompts/geometry.md"
prefix = "E"
difficulty = "hard"
output_file = "data/questions/questions_{today_str}_geometry.json"

[exam]
# 模考配置
math_timeout_minutes = 60
ket_reading_writing_minutes = 60
ket_listening_minutes = 30
