[api]
# 火山方舟 DeepSeek V4 Pro（替换原 DeepSeek 官方 API）
# 在火山方舟控制台创建推理接入点后，将 endpoint_id 填到下方
model = "ep-你的接入点ID"
base_url = "https://ark.cn-beijing.volces.com/api/v3"
max_tokens = 4096
temperature = 0.7

[paths]
workspace = "workspace"
sessions = "data/sessions"
notes = "data/notes"
methods = "methods"
data = "data"
tools = "tools"

[runtime]
max_iterations = 30
max_tool_output = 8000
server_port = 8192

[education]
# 每日学习配置
math_daily_count = 4
english_daily_count = 4
exam_questions_count = 25      # 模考题数

# 出题时间
push_time = "09:00"
friday_3days = false           # 已停用：每天正常出题，前一天未批改则跳过

# 课程起始日
course_start_date = "2026-05-14"

# 难度偏差: easy / normal / hard
difficulty_bias = "hard"

# 艾宾浩斯复习间隔（天）
ebbinghaus_intervals = [1, 2, 4, 7, 15]

# 掌握度阈值
[education.mastery]
mastered = 95         # >= 95 已掌握，降低出题频率
learning = 70         # 70-94 学习中
weak = 50             # 50-69 薄弱
critical = 0          # < 50 严重不足

# 掌握度分变动
[education.mastery_score]
perfect = 5           # 全对 +5
partial = 1           # 部分对 +1
wrong = -10           # 全错 -10

[feishu]
# 飞书API基础URL
base_url = "https://open.feishu.cn/open-apis"
# 消息卡片颜色
card_color = "orange"

# 消息轮询（内网无公网IP时使用，替代事件回调）
[feishu.poll]
enabled = true
# 要轮询的聊天ID列表（去飞书给机器人发消息后按下面方法获取）
chat_ids = ["oc_a232ed8b096918c5ff89fa9149e321fa"]
# 轮询间隔（秒）
interval_seconds = 10

[ocr]
# OCR引擎（纯云端，代码自动选择：飞书OCR → ocr.space 降级）
# 飞书OCR为主力引擎，需在飞书开放平台开通 optical_char_recognition 权限
# ocr.space 为备用（免费25000次/月），需在 https://ocr.space/ocrapi 注册获取API Key
# API Key 配置在 .env 文件的 OCR_SPACE_API_KEY 字段

[exam]
# 模考配置
math_timeout_minutes = 60
ket_reading_writing_minutes = 60
ket_listening_minutes = 30
